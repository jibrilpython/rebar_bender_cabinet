name: rebar_bender_cabinet
description: "The Rebar Bender Archive — A digital archive for collectors of historical rebar bending tools."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2
  path_provider: ^2.1.5
  uuid: ^4.5.1
  sensors_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  adaptive_icon_background: "#121417"
  adaptive_icon_foreground: "assets/images/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true

flutter_native_splash:
  color: "#121417"
  image: "assets/images/logo.png"
  android_12:
    image: "assets/images/logo.png"
    color: "#121417"
  fullscreen: true
